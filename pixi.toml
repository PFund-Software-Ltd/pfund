[workspace]
authors = ["softwareentrepreneer <softwareentrepreneer+pfund@gmail.com>"]
channels = ["conda-forge"]
name = "pfund"
platforms = ["osx-arm64", "linux-64"]
# NOTE: this depends on the lock version used in setup-pixi in ci.yml
# currently the max lock-version supported is 6
requires-pixi = "<=0.67.2"  # command: pixi workspace requires-pixi set "<=0.67.2"

[tasks]

[tasks.test-all]
depends-on = [
  { task = "test", environment = "py311" },
  { task = "test", environment = "py312" },
  { task = "test", environment = "py313" },
]

# TODO: add default-wasm, py311-wasm, py312-wasm, py313-wasm
[environments]
default = ["py311", "dev", "optional"]
py311 = ["py311", "test", "optional"]
py312 = ["py312", "test", "optional"]
py313 = ["py313", "test", "optional"]

[dependencies]
python = ">=3.11.15"
uv = ">=0.11.18"
gh = ">=2.92.0"

[pypi-dependencies]
pfund-kit = ">=0.1.11"
pfeed = ">=0.0.14"
httpx = ">=0.28.1"
websockets = ">=16.0.0"

[feature.optional.pypi-dependencies]
numba = ">=0.65.1"
pfeed = { version = ">=0.0.14", extras = ["duckdb", "core", "yfinance", "hf"] }
pfolio = ">=0.0.4"
# TODO: enable when ready
# pfund-plot = {version = ">=0.0.1.dev3", extras = ["marimo"]}
# mtflow = ">=0.0.1.dev2"
pfund-ibapi = ">=10.42.1"
joblib = ">=1.5.3"
scikit-learn = ">=1.9.0"
torch = ">=2.11.0"
safetensors = ">=0.7.0"
jax = ">=0.10.1"
orbax-checkpoint = ">=0.11.40"
[feature.optional.dependencies]
ta-lib = ">=0.6.4"

[feature.dev.pypi-dependencies]
pfund = { path = ".", editable = true }
# TEMP
pfund-plot = { path = "../pfund-plot", editable = true, extras = ["marimo", "jupyter", "matplotlib", "plotly", "altair"] }
pfolio = { path = "../pfolio", editable = true }
mtflow = { path = "../mtflow", editable = true }
afterpython = ">=0.3.16"
basedpyright = ">=1.39.6"
marimo = { version = ">=0.23.8", extras = ["recommended", "lsp"] }
jupytext = ">=1.19.3"
jupyterlab = ">=4.5.7"
graphviz = ">=0.21"
memray = ">=1.19.3"
pandas-stubs = ">=2.2.3.250527"
pybit = ">=5.16.0"
flax = ">=0.12.7"
equinox = ">=0.13.8"
optax = ">=0.2.8"

[feature.test.pypi-dependencies]
pfund = { path = ".", editable = true }
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
pytest-mock = ">=3.15.1"
pytest-xdist = ">=3.8.0"
pytest-asyncio = ">=1.3.0"
pytest-recording = ">=0.13.4"
testcontainers = ">=4.14.2"
[feature.test.tasks]
test = "pytest"
test-new = "pytest --record-mode=all"  # record new interactions, useful to update recordings in case data formats returned have changed
test-ci = "pytest --record-mode=none"  # fail a test if no recording is found

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"
