[workspace]
authors = ["softwareentrepreneer <softwareentrepreneer+pfund@gmail.com>"]
channels = ["conda-forge"]
name = "pfund"
platforms = ["osx-arm64", "linux-64"]
# updating this needs to also update the version in the ci.yml and templates/ci-workflow-template.yml files
requires-pixi = ">=0.66.0"  # command: pixi workspace requires-pixi set ">=0.66.0"

[tasks]

[tasks.test-all]
depends-on = [
  { task = "test", environment = "py311" },
  { task = "test", environment = "py312" },
  { task = "test", environment = "py313" },
]

[environments]
default = ["py311", "dev", "optional"]
py311 = ["py311", "test", "optional"]
py312 = ["py312", "test", "optional"]
py313 = ["py313", "test", "optional"]

[dependencies]
python = ">=3.11.14"
uv = ">=0.11.2"
gh = ">=2.87.2"

[pypi-dependencies]
# TEMP
pfeed = { path = "../pfeed", editable = true, extras = ["duckdb"] }
pfolio = { path = "../pfolio", editable = true }
pfund-plot = { path = "../pfund-plot", editable = true, extras = ["marimo"] }
mtflow = { path = "../mtflow", editable = true }
# pfeed = { version = ">=0.0.5", extras = ["duckdb"] }
# pfolio = ">=0.0.3"
# pfund-plot = {version = ">=0.0.1.dev3", extras = ["marimo"]}
# mtflow = ">=0.0.1.dev2"
numba = ">=0.64.0"
httpx = ">=0.28.1"
websockets = ">=16.0.0"

[feature.optional.pypi-dependencies]
pfund-ibapi = ">=10.42.1"
[feature.optional.dependencies]
ta-lib = ">=0.6.4"

[pypi-options.dependency-overrides]
pfund = { path = ".", editable = true }
# TEMP
pfeed = { path = "../pfeed", editable = true, extras = ["duckdb", "yfinance", "hf"] }
pfolio = { path = "../pfolio", editable = true }
pfund-plot = { path = "../pfund-plot", editable = true, extras = ["marimo", "jupyter", "matplotlib", "plotly", "altair"] }
pfund-kit = { path = "../pfund-kit", editable = true }
mtflow = { path = "../mtflow", editable = true }

[feature.dev.pypi-dependencies]
afterpython = ">=0.2.1"
basedpyright = ">=1.38.1"
# TEMP
pfund-plot = { path = "../pfund-plot", editable = true, extras = ["marimo", "jupyter", "matplotlib", "plotly", "altair"] }
# pfund-plot = {version = ">=0.0.1.dev3", extras = ["marimo", "jupyter"]}
memray = ">=1.19.1"
pandas-stubs = ">=2.3.3.260113"
pybit = ">=5.13.0"
torch = ">=2.10.0"
skorch = ">=1.3.1"
scikit-learn = ">=1.8.0"
mlflow = ">=3.10.1"
trackio = ">=0.19.0"
optuna = ">=4.8.0"
botorch = ">=0.17.2"
optuna-dashboard = ">=0.20.0"
vectorbt = ">=0.28.4"
backtesting = ">=0.6.5"
backtrader = ">=1.9.78.123"

[feature.test.pypi-dependencies]
pytest = ">=9.0.2"
pytest-cov = ">=7.0.0"
pytest-mock = ">=3.15.1"
pytest-xdist = ">=3.8.0"
pytest-asyncio = ">=1.3.0"
pytest-recording = ">=0.13.4"
testcontainers = ">=4.13.3"
[feature.test.tasks]
test = "pytest"
test-new = "pytest --record-mode=all"  # record new interactions, useful to update recordings in case data formats returned have changed
test-ci = "pytest --record-mode=none"  # fail a test if no recording is found

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"
